version: '3.8'

services:
  # --- Layer 1: OpenTripPlanner Java Graph Engine ---
  otp-engine:
    image: eclipse-temurin:17-jre-jammy
    container_name: otp_routing_container
    volumes:
      - ./otp:/app/otp
    working_dir: /app/otp
    # Allocate 3GB of heap limit strictly to the Java instance
    command: java -Xmx3G -jar otp-2.4.0-shaded.jar --load .
    expose:
      - "8080"
    restart: always

  # --- Layer 2: Your FastAPI Intelligence Interceptor ---
  fastapi-backend:
    build: .
    container_name: fastapi_middleware_container
    ports:
      - "80:8000" # Map production web traffic port 80 to FastAPI
    environment:
      - OTP_URL=http://otp-engine:8080/otp/routers/default/index/graphql
      - REDIS_URL=redis://redis-cache:6375/0
    depends_on:
      - otp-engine
    restart: always