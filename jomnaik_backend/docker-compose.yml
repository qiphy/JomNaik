version: '3.8'

services:
  # --- Layer 1: MOTIS multimodal routing engine ---
  motis-engine:
    build:
      context: .
      dockerfile: Dockerfile.motis
    container_name: motis_routing_container
    expose:
      - "8080"
    restart: always

  # --- Layer 2: Your FastAPI Intelligence Interceptor ---
  fastapi-backend:
    build:
      context: .
      # The repository currently uses this capitalized filename; specify it
      # explicitly so builds also work on Linux hosts.
      dockerfile: DockerFile
    container_name: fastapi_middleware_container
    ports:
      - "80:8000" # Map production web traffic port 80 to FastAPI
    # Keep Supabase's service-role key on the server. It is needed only for
    # aggregated incident reads and must never be compiled into Flutter.
    env_file:
      - .env
    environment:
      - MOTIS_URL=http://motis-engine:8080
      - REDIS_URL=redis://redis-cache:6375/0
    depends_on:
      - motis-engine
    restart: always
